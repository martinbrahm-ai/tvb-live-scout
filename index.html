<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena Scout</title>

  <style>
    :root {
      --bg: #07111d;
      --panel: #0d1726;
      --panel-2: #122034;
      --text: #f5f7fb;
      --muted: #9fb0c5;
      --line: #f4f4f4;
      --border: rgba(255,255,255,0.12);
      --zone: rgba(67, 116, 180, 0.12);
      --zone-hover: rgba(0, 194, 168, 0.22);
      --zone-active: rgba(0, 194, 168, 0.45);
      --inactive: rgba(100, 130, 160, 0.08);
      --accent: #2f8cff;
      --danger: #ff6b6b;
      --goal: #d92f2f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(760px, 1fr) 420px;
      gap: 18px;
      padding: 18px;
    }

    .card {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.24);
    }

    .field-card {
      padding: 14px;
    }

    .side-card {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.15;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 12px;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
      background: #08111c;
      border-radius: 14px;
    }

    .zone {
      fill: var(--zone);
      stroke: rgba(255,255,255,0.42);
      stroke-width: 1.5;
      vector-effect: non-scaling-stroke;
      transition: fill .15s ease, stroke .15s ease;
      cursor: pointer;
    }

    .zone:hover {
      fill: var(--zone-hover);
      stroke: rgba(255,255,255,0.95);
    }

    .zone.active {
      fill: var(--zone-active);
      stroke: #ffffff;
    }

    .zone.inactive {
      fill: var(--inactive);
      stroke: rgba(255,255,255,0.22);
      pointer-events: none;
      cursor: default;
    }

    .meta-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 64px;
    }

    .pill .k {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: .04em;
      margin-bottom: 6px;
    }

    .pill .v {
      font-size: 15px;
      font-weight: 700;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 0 12px;
      font-size: 14px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47,140,255,0.15);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 0 12px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      border-color: rgba(255,255,255,0.35);
    }

    button.active {
      background: rgba(47,140,255,0.18);
      border-color: var(--accent);
    }

    button.primary {
      background: linear-gradient(180deg, #2f8cff, #1569d8);
      border-color: #2f8cff;
    }

    button.danger {
      background: rgba(255,107,107,0.14);
      border-color: rgba(255,107,107,0.42);
    }

    pre {
      margin: 0;
      padding: 12px;
      border-radius: 12px;
      background: #09111b;
      border: 1px solid var(--border);
      overflow: auto;
      font-size: 12px;
      line-height: 1.45;
      color: #d8e2ef;
      min-height: 120px;
    }

    .save-status {
      font-size: 13px;
      color: #b9d1ea;
      min-height: 18px;
    }

    @media (max-width: 1180px) {
      .page {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp,
    getDocs,
    doc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAJwAR1krrLK-fU-uCtLz8dqRvtdoTyPWY",
    authDomain: "udoagentendaten.firebaseapp.com",
    projectId: "udoagentendaten",
    storageBucket: "udoagentendaten.firebasestorage.app",
    messagingSenderId: "115120028998",
    appId: "1:115120028998:web:fb24fc6ab5059288da7947",
    measurementId: "G-J5M3ZWZ1V9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const state = {
    zoneId: null,
    positionCode: null,
    positionLabel: null,
    directionCode: null,
    points: null,
    outcomeCode: null,
    resultCode: null,
    twoMinCode: 0,
    eventPayload: null,
    matches: []
  };

  const labels = {
    direction: {
      1: "zur_hand",
      2: "gegen_hand"
    },
    outcome: {
      1: "gewonnen",
      2: "verloren",
      3: "fehler"
    },
    result: {
      0: "spiel_geht_weiter",
      1: "tor",
      2: "foul_bei_spieler",
      4: "7m"
    },
    twoMin: {
      0: "nein",
      1: "ja"
    }
  };

  function updateMeta() {
    document.getElementById("metaZone").textContent = state.zoneId ?? "–";
    document.getElementById("metaPosition").textContent =
      state.positionLabel ? `${state.positionLabel} (${state.positionCode})` : "–";
    document.getElementById("metaDirection").textContent =
      state.directionCode ? `${labels.direction[state.directionCode]} (${state.directionCode})` : "–";
    document.getElementById("metaPoints").textContent =
      Number.isFinite(state.points) ? String(state.points) : "–";
  }

  function bindToggleGroup(groupId, stateKey) {
    const buttons = document.querySelectorAll(`#${groupId} button`);
    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        state[stateKey] = Number(btn.dataset.value);
        updateMeta();
      });
    });
  }

  function activateZones() {
    const zones = document.querySelectorAll(".zone:not(.inactive)");
    zones.forEach(zone => {
      zone.addEventListener("click", () => {
        zones.forEach(z => z.classList.remove("active"));
        zone.classList.add("active");

        state.zoneId = zone.dataset.zoneId;
        state.positionCode = Number(zone.dataset.positionCode);
        state.positionLabel = zone.dataset.positionLabel;
        state.points = Number(zone.dataset.points);

        updateMeta();
      });
    });
  }

  function renderMatchOptions(matches) {
    const select = document.getElementById("matchSelect");
    select.innerHTML = "";

    if (!matches.length) {
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "Keine Spiele gefunden";
      select.appendChild(opt);
      return;
    }

    matches.forEach(match => {
      const opt = document.createElement("option");
      opt.value = match.id;
      opt.textContent = match.label;
      select.appendChild(opt);
    });
  }

  async function loadMatchById(matchId) {
    if (!matchId) return false;

    try {
      const snap = await getDoc(doc(db, "matches", matchId));
      if (!snap.exists()) {
        console.warn("Match nicht gefunden:", matchId);
        return false;
      }

      const data = snap.data() || {};

      const home =
        data.home_team_name ||
        data.team_name ||
        data.homeTeam ||
        data.home ||
        "TVB Stuttgart";

      const away =
        data.away_team_name ||
        data.opponent_name ||
        data.awayTeam ||
        data.away ||
        "Gegner";

      document.getElementById("matchId").value = matchId;
      document.getElementById("matchLabel").textContent = `${home} vs. ${away}`;

const tsRaw =
  data.start_time ||
  data.match_date ||
  data.date ||
  data.created_at ||
  null;

let ts = null;

if (tsRaw?.toDate) {
  ts = tsRaw.toDate();
} else if (typeof tsRaw === "string" || typeof tsRaw === "number") {
  const parsed = new Date(tsRaw);
  if (!isNaN(parsed.getTime())) ts = parsed;
}

if (ts) {
  const y = ts.getFullYear();
  const m = String(ts.getMonth() + 1).padStart(2, "0");
  const d = String(ts.getDate()).padStart(2, "0");
  const hh = String(ts.getHours()).padStart(2, "0");
  const mm = String(ts.getMinutes()).padStart(2, "0");
  const ss = String(ts.getSeconds()).padStart(2, "0");
  document.getElementById("timestamp").value = `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
} else {
  document.getElementById("timestamp").value = "";
}

      return true;
    } catch (err) {
      console.error("Fehler beim direkten Match-Load:", err);
      return false;
    }
  }

  async function loadMatches() {
    const select = document.getElementById("matchSelect");
    select.innerHTML = `<option value="">Lade Spiele...</option>`;

    try {
      const snap = await getDocs(collection(db, "matches"));

      if (snap.empty) {
        console.warn("Collection matches leer. Nutze Fallback per Match-ID.");
        select.innerHTML = `<option value="">Keine Spiele gefunden</option>`;

        const fallbackMatchId = document.getElementById("matchId").value.trim() || "62090160";
        await loadMatchById(fallbackMatchId);
        return;
      }

      state.matches = snap.docs.map(d => {
        const data = d.data() || {};

        const home =
          data.home_team_name ||
          data.team_name ||
          data.homeTeam ||
          data.home ||
          "TVB Stuttgart";

        const away =
          data.away_team_name ||
          data.opponent_name ||
          data.awayTeam ||
          data.away ||
          "Gegner";

        let dateStr = "ohne Datum";
        const ts = data.date?.toDate ? data.date.toDate() : new Date(data.date);
        if (ts) dateStr = ts.toLocaleDateString("de-DE");

        return {
          id: d.id,
          data,
          label: `${dateStr} | ${home} vs. ${away}`
        };
      });

      renderMatchOptions(state.matches);

      if (state.matches.length) {
        select.value = state.matches[0].id;
        await applySelectedMatch();
      }
    } catch (err) {
      console.error("Fehler beim Laden der Spiele:", err);
      select.innerHTML = `<option value="">Fehler beim Laden</option>`;

      const fallbackMatchId = document.getElementById("matchId").value.trim() || "62090160";
      await loadMatchById(fallbackMatchId);
    }
  }

  async function applySelectedMatch() {
    const matchId = document.getElementById("matchSelect").value;
    if (!matchId) return;
    await loadMatchById(matchId);
  }

  function buildEvent() {
    const matchId = document.getElementById("matchId").value.trim();
    const timestamp = document.getElementById("timestamp").value.trim();
    const playerNumberRaw = document.getElementById("playerNumber").value.trim();
    const opponentRaw = document.getElementById("opponentNumber").value.trim();

    if (!matchId) return alert("Bitte Spiel wählen.");
    if (!timestamp) return alert("Bitte Timestamp setzen.");
    if (!playerNumberRaw) return alert("Bitte Spielernummer setzen.");
    if (!state.zoneId) return alert("Bitte Zone anklicken.");
    if (!state.directionCode) return alert("Bitte Richtung wählen.");
    if (!state.outcomeCode) return alert("Bitte Ausgang wählen.");
    if (state.resultCode === null) return alert("Bitte Ergebnis wählen.");

    const playerNumber = Number(playerNumberRaw);
    const opponentNumber = opponentRaw === "" ? 0 : Number(opponentRaw);

    const scoutSequence = [
      playerNumber,
      opponentNumber,
      state.positionCode,
      state.directionCode,
      state.outcomeCode,
      state.resultCode,
      state.twoMinCode ?? 0
    ].join(",");

    const payload = {
      event_type: "duel",
      match_id: matchId,
      timestamp,
      team_player_number: playerNumber,
      opponent_player_number: opponentNumber,
      position_code: state.positionCode,
      position_label: state.positionLabel,
      direction_code: state.directionCode,
      direction_label: labels.direction[state.directionCode],
      zone_id: state.zoneId,
      points: state.points,
      outcome_code: state.outcomeCode,
      outcome_label: labels.outcome[state.outcomeCode],
      result_code: state.resultCode,
      result_label: labels.result[state.resultCode],
      two_min_code: state.twoMinCode ?? 0,
      two_min_label: labels.twoMin[state.twoMinCode ?? 0],
      scout_sequence: scoutSequence,
      source: "arena_scout",
      created_at: serverTimestamp()
    };

    state.eventPayload = payload;
    document.getElementById("sequenceBox").textContent = scoutSequence;
    document.getElementById("jsonBox").textContent = JSON.stringify(
      { ...payload, created_at: "serverTimestamp()" },
      null,
      2
    );
    document.getElementById("saveStatus").textContent = "Event gebaut. Bereit für Save.";
    return payload;
  }

  async function saveEvent() {
    const payload = state.eventPayload || buildEvent();
    if (!payload) return;

    const saveStatus = document.getElementById("saveStatus");
    saveStatus.textContent = "Speichere ...";

    try {
      await addDoc(collection(db, "matches", payload.match_id, "scout_events"), payload);
      saveStatus.textContent = "Gespeichert ✅";
    } catch (error) {
      console.error("Fehler beim Speichern:", error);
      saveStatus.textContent = "Fehler beim Speichern ❌";
    }
  }

  function resetAll() {
    document.querySelectorAll(".zone").forEach(z => z.classList.remove("active"));
    document.querySelectorAll(".button-row button").forEach(b => b.classList.remove("active"));

    state.zoneId = null;
    state.positionCode = null;
    state.positionLabel = null;
    state.directionCode = null;
    state.points = null;
    state.outcomeCode = null;
    state.resultCode = null;
    state.twoMinCode = 0;
    state.eventPayload = null;

    document.getElementById("playerNumber").value = "";
    document.getElementById("opponentNumber").value = "";
    document.getElementById("sequenceBox").textContent = "–";
    document.getElementById("jsonBox").textContent = "{}";
    document.getElementById("saveStatus").textContent = "";
    updateMeta();
  }

  window.addEventListener("DOMContentLoaded", async () => {
    activateZones();
    bindToggleGroup("directionButtons", "directionCode");
    bindToggleGroup("outcomeButtons", "outcomeCode");
    bindToggleGroup("resultButtons", "resultCode");
    bindToggleGroup("twoMinButtons", "twoMinCode");

    document.getElementById("buildBtn").addEventListener("click", buildEvent);
    document.getElementById("saveBtn").addEventListener("click", saveEvent);
    document.getElementById("resetBtn").addEventListener("click", resetAll);
    document.getElementById("matchSelect").addEventListener("change", applySelectedMatch);

    updateMeta();
    await loadMatches();
  });
</script>
</head>
<body>
  <div class="page">
    <section class="card field-card">
      <h1>Arena Scout</h1>
      <div class="sub">
        Spiele werden aus <code>matches</code> geladen. Save schreibt nach
        <code>/matches/{matchId}/scout_events</code>.
      </div>
      <div class="sub" id="matchLabel">Kein Spiel geladen</div>

      <svg viewBox="0 0 1200 800" aria-label="Handball-Halbfeld mit Zonen">
        <image href="./Sektoren.jpeg" width="1200" height="800" preserveAspectRatio="none" />

        <polygon id="ra_1" class="zone"
          points="61,665 179,666 170,730 58,727"
          data-zone-id="ra_1" data-position-code="6" data-position-label="RA" data-points="1"></polygon>

        <polygon id="ra_2" class="zone"
          points="58,603 207,605 179,666 61,665"
          data-zone-id="ra_2" data-position-code="6" data-position-label="RA" data-points="2"></polygon>

        <polygon id="ra_3" class="zone"
          points="58,544 247,559 207,605 58,603"
          data-zone-id="ra_3" data-position-code="6" data-position-label="RA" data-points="3"></polygon>

        <polygon id="hr_1" class="zone"
          points="178,426 287,522 247,559 58,544"
          data-zone-id="hr_1" data-position-code="5" data-position-label="HR" data-points="1"></polygon>

        <polygon id="hr_2" class="zone"
          points="284,378 348,495 287,522 178,426"
          data-zone-id="hr_2" data-position-code="5" data-position-label="HR" data-points="2"></polygon>

        <polygon id="hr_3" class="zone"
          points="457,362 458,474 348,495 284,378"
          data-zone-id="hr_3" data-position-code="5" data-position-label="HR" data-points="3"></polygon>

        <polygon id="rm_main" class="zone"
          points="457,362 727,358 727,474 458,474"
          data-zone-id="rm_main" data-position-code="3" data-position-label="RM" data-points="3"></polygon>

        <polygon id="hl_3" class="zone"
          points="727,358 875,371 843,488 727,474"
          data-zone-id="hl_3" data-position-code="2" data-position-label="HL" data-points="3"></polygon>

        <polygon id="hl_2" class="zone"
          points="875,371 1022,427 923,530 843,488"
          data-zone-id="hl_2" data-position-code="2" data-position-label="HL" data-points="2"></polygon>

        <polygon id="hl_1" class="zone"
          points="1022,427 1133,546 953,567 923,530"
          data-zone-id="hl_1" data-position-code="2" data-position-label="HL" data-points="1"></polygon>

        <polygon id="la_3" class="zone"
          points="953,567 1133,546 1134,608 989,608"
          data-zone-id="la_3" data-position-code="1" data-position-label="LA" data-points="3"></polygon>

        <polygon id="la_2" class="zone"
          points="989,608 1134,608 1133,660 1013,664"
          data-zone-id="la_2" data-position-code="1" data-position-label="LA" data-points="2"></polygon>

        <polygon id="la_1" class="zone"
          points="1013,664 1133,660 1134,725 1021,730"
          data-zone-id="la_1" data-position-code="1" data-position-label="LA" data-points="1"></polygon>

        <polygon id="rueckraum" class="zone inactive"
          points="61,347 227,291 434,251 636,243 835,261 981,291 1133,342 1131,519 1025,427 856,366 679,360 479,360 317,371 175,422 96,485 62,522"
          data-zone-id="rr_1" data-position-code="9" data-position-label="RR" data-points="1"></polygon>

        <polygon id="kreis" class="zone inactive"
          points="226,584 218,605 256,592 306,575 364,560 417,547 473,543 519,539 562,535 620,536 668,539 745,551 822,568 881,591 939,610 993,632 955,568 870,506 774,480 604,471 449,474 335,504 218,599"
          data-zone-id="km_1" data-position-code="4" data-position-label="KM" data-points="1"></polygon>
      </svg>

      <div class="meta-strip">
        <div class="pill"><div class="k">Zone</div><div class="v" id="metaZone">–</div></div>
        <div class="pill"><div class="k">Position</div><div class="v" id="metaPosition">–</div></div>
        <div class="pill"><div class="k">Richtung</div><div class="v" id="metaDirection">–</div></div>
        <div class="pill"><div class="k">Punkte</div><div class="v" id="metaPoints">–</div></div>
      </div>
    </section>

    <aside class="card side-card">
      <div class="grid-2">
        <div>
          <label for="matchSelect">Spiel laden</label>
          <select id="matchSelect"></select>
        </div>
        <div>
          <label for="matchId">Match ID</label>
          <input id="matchId" value="62090160" />
        </div>
      </div>

      <div class="grid-2">
        <div>
          <label for="timestamp">Timestamp</label>
          <input id="timestamp" />
        </div>
        <div>
          <label for="playerNumber">Spieler</label>
          <input id="playerNumber" type="number" />
        </div>
      </div>

      <div>
        <label for="opponentNumber">Gegner</label>
        <input id="opponentNumber" type="number" />
      </div>

      <div>
        <label>Richtung am Verteidiger vorbei</label>
        <div class="button-row" id="directionButtons">
          <button type="button" data-value="1">Zur Hand</button>
          <button type="button" data-value="2">Gegen Hand</button>
        </div>
      </div>

      <div>
        <label>Ausgang</label>
        <div class="button-row" id="outcomeButtons">
          <button type="button" data-value="1">Gewonnen</button>
          <button type="button" data-value="2">Verloren</button>
          <button type="button" data-value="3">Fehler</button>
        </div>
      </div>

      <div>
        <label>Ergebnis</label>
        <div class="button-row" id="resultButtons">
          <button type="button" data-value="0">Weiter</button>
          <button type="button" data-value="1">Tor</button>
          <button type="button" data-value="2">Foul</button>
          <button type="button" data-value="4">7m</button>
        </div>
      </div>

      <div>
        <label>2 Minuten</label>
        <div class="button-row" id="twoMinButtons">
          <button type="button" data-value="0">Nein</button>
          <button type="button" data-value="1">Ja</button>
        </div>
      </div>

      <div class="button-row">
        <button class="primary" id="buildBtn" type="button">Event bauen</button>
        <button class="primary" id="saveBtn" type="button">Save</button>
        <button class="danger" id="resetBtn" type="button">Reset</button>
      </div>

      <div class="save-status" id="saveStatus"></div>

      <div>
        <label>Scout Sequence</label>
        <pre id="sequenceBox">–</pre>
      </div>

      <div>
        <label>Event JSON</label>
        <pre id="jsonBox">{}</pre>
      </div>
    </aside>
  </div>
</body>
</html>
