<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TVB Live Scout</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f4f6;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-left img {
      height: 40px;
    }

    .header-right img {
      height: 25px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .container {
      max-width: 1200px;
      margin: 20px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    label {
      font-size: 14px;
      margin-bottom: 5px;
      display: block;
    }

    select, input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #eef1f5;
      font-size: 16px;
    }

    textarea {
      grid-column: span 3;
      height: 100px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: #2b6cb0;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="header-left">
    <!-- TVB LOGO -->
    <img src="https://upload.wikimedia.org/wikipedia/de/thumb/5/5b/TVB_Stuttgart_Logo.svg/512px-TVB_Stuttgart_Logo.svg.png">
    
    <div class="title" id="matchHeader">
      Lade Spiel...
    </div>
  </div>

  <div class="header-right">
    <!-- CAPANEO LOGO -->
    <img src="https://www.capaneo.com/wp-content/uploads/2021/05/logo-capaneo.png">
  </div>
</div>

<div class="container">

  <div class="grid">

    <div>
      <label>Kontext</label>
      <select id="context">
        <option value="tvb_attack">TVB Angriff</option>
        <option value="tvb_defense">TVB Abwehr</option>
      </select>
    </div>

    <div>
      <label>Aktion</label>
      <select id="action">
        <option value="duel">Zweikampf</option>
        <option value="shot">Wurf</option>
      </select>
    </div>

    <div>
      <label>Ergebnis</label>
      <select id="result">
        <option value="won">Gewonnen</option>
        <option value="lost">Verloren</option>
      </select>
    </div>

    <div>
      <label>Folgeaktion</label>
      <select id="follow">
        <option value="goal">Tor</option>
        <option value="none">Keine</option>
      </select>
    </div>

    <div>
      <label>Zahlensituation</label>
      <select id="numbers">
        <option value="equal">Gleichzahl</option>
      </select>
    </div>

    <div>
      <label>1:1</label>
      <input type="checkbox" id="onevone">
    </div>

    <div>
      <label>Zone</label>
      <input id="zone" value="0/1">
    </div>

    <div>
      <label>Wurf von Zone</label>
      <input id="shot_from" value="0/1">
    </div>

    <div>
      <label>Ziel im Tor</label>
      <input id="target" value="center_high">
    </div>

    <textarea id="notes">Minute 3,25 Hefner gegen Fischer gewonnen, Tor.</textarea>

  </div>

  <button id="sendBtn">Senden</button>
  <div id="status">Initialisiere...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJwAR1krrLK-fU-uCtLz8dqRvtdoTyPWY",
  authDomain: "udoagentendaten.firebaseapp.com",
  projectId: "udoagentendaten",
  storageBucket: "udoagentendaten.firebasestorage.app",
  messagingSenderId: "115120028998",
  appId: "1:115120028998:web:fb24fc6ab5059288da7947"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const status = document.getElementById("status");

// 👉 MATCH ID aus URL holen
const params = new URLSearchParams(window.location.search);
const matchId = params.get("match_id") || "62090160";

// 👉 Match laden (optional)
async function loadMatch() {
  try {
    const ref = doc(db, "matches", matchId);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      const data = snap.data();
      document.getElementById("matchHeader").innerText =
        `Du scoutest für Spiel ${matchId} | ${data.date || ""} | ${data.home || ""} vs ${data.away || ""}`;
    } else {
      document.getElementById("matchHeader").innerText =
        `Du scoutest für Spiel ${matchId}`;
    }

  } catch (err) {
    console.error(err);
  }
}

loadMatch();

document.getElementById("sendBtn").addEventListener("click", async () => {

  status.innerText = "Sende...";

  const payload = {
    match_id: matchId,
    team_context: document.getElementById("context").value,
    action_type: document.getElementById("action").value,
    result: document.getElementById("result").value,
    follow_action: document.getElementById("follow").value,
    numerical_situation: document.getElementById("numbers").value,
    is_one_v_one: document.getElementById("onevone").checked,
    zone: document.getElementById("zone").value,
    shot_from_zone: document.getElementById("shot_from").value,
    shot_target_zone: document.getElementById("target").value,
    notes: document.getElementById("notes").value,
    source: "manual_ui",
    created_at: serverTimestamp()
  };

  try {
    await addDoc(collection(db, "matches", matchId, "scout_events"), payload);
    status.innerText = "✅ Gespeichert";
  } catch (err) {
    console.error(err);
    status.innerText = "❌ Fehler: " + err.message;
  }

});

</script>

</body>
</html>
