      margin-bottom: 5px;

    }

    }

    button {

      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #2b6cb0;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

<body>

<div class="container">
  <h2>Manuelle Erfassung</h2>

  <div class="grid">

    <div>
      <label>Kontext</label>
      <select id="context">
        <option value="tvb_attack">TVB Angriff</option>
        <option value="tvb_defense">TVB Abwehr</option>
      </select>
    </div>

    <div>
      <label>Aktion</label>
      <select id="action">
        <option value="duel">Zweikampf</option>
        <option value="shot">Wurf</option>
      </select>
    </div>

    <div>
      <label>Ergebnis</label>
      <select id="result">
        <option value="won">Gewonnen</option>
        <option value="lost">Verloren</option>
      </select>
    </div>

    <div>
      <label>Folgeaktion</label>
      <select id="follow">
        <option value="goal">Tor</option>
        <option value="none">Keine</option>
      </select>
    </div>

    <div>
      <label>Zahlensituation</label>
      <select id="numbers">
        <option value="equal">Gleichzahl</option>
        <option value="overload">Überzahl</option>
      </select>
    </div>

    <div>
      <label>1:1</label>
      <input type="checkbox" id="onevone">
    </div>

    <div>
      <label>TVB Spieler</label>
      <input id="player_tvb">
    </div>

    <div>
      <label>Gegenspieler</label>
      <input id="player_opponent">
    </div>

    <div>
      <label>TVB System</label>
      <select id="system">
        <option value="6:0">6:0</option>
        <option value="5:1">5:1</option>
      </select>
    </div>

    <div>
      <label>Zone</label>
      <input id="zone" value="0/1">
    </div>

    <div>
      <label>Wurf von Zone</label>
      <input id="shot_from" value="0/1">
    </div>

    <div>
      <label>Ziel im Tor</label>
      <select id="target">
        <option value="center_high">center_high</option>
        <option value="left_low">left_low</option>
        <option value="right_low">right_low</option>
      </select>
    </div>

  </div>

  <label>Notizen / Rohtext</label>
  <textarea id="notes" rows="3"></textarea>

  <button onclick="submitEvent()">Senden</button>

</div>

</body>
